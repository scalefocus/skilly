name: 💡 Feature request
description: Propose a new capability or a change to existing behavior.
labels: [enhancement]
body:
  - type: markdown
    attributes:
      value: |
        skilly is **spec-first**: any change to behavior, data, or contracts lands in
        `SKILLY_SPEC.md` before code. Framing your request against the spec speeds review.
  - type: textarea
    id: problem
    attributes:
      label: Problem / motivation
      description: >-
        What can't you do today? Who is affected — which role (Platform Admin,
        Namespace Admin, Namespace Member, or a skill consumer)?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: What should skilly do? Describe the behavior, not the implementation.
    validations:
      required: true
  - type: textarea
    id: spec-impact
    attributes:
      label: Spec / invariant impact
      description: >-
        Does this touch a non-negotiable invariant (immutable versions, append-only audit,
        strict visibility filtering, SCIM-resolved roles, the pinned `npx skills add`
        contract)? Which SKILLY_SPEC.md section(s) would change?
    validations:
      required: false
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
    validations:
      required: false
  - type: checkboxes
    id: checks
    attributes:
      label: Before submitting
      options:
        - label: I searched existing issues and this isn't a duplicate.
          required: true
