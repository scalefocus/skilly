apiVersion: batch/v1
kind: Job
metadata:
  name: {{ include "skilly.fullname" . }}-migrate
  labels:
    {{- include "skilly.labels" . | nindent 4 }}
  annotations:
    # Run before the app rolls out, on every install/upgrade.
    "helm.sh/hook": pre-install,pre-upgrade
    "helm.sh/hook-weight": "0"
    "helm.sh/hook-delete-policy": before-hook-creation,hook-succeeded
spec:
  backoffLimit: 3
  template:
    metadata:
      labels:
        {{- include "skilly.labels" . | nindent 8 }}
    spec:
      restartPolicy: Never
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: migrate
          image: {{ .Values.postgres.image | quote }}
          env:
            - name: PGHOST
              value: {{ include "skilly.pgHost" . | quote }}
            - name: PGPORT
              value: {{ include "skilly.pgPort" . | quote }}
            - name: PGUSER
              value: {{ .Values.postgres.user | quote }}
            - name: PGDATABASE
              value: {{ .Values.postgres.database | quote }}
            - name: PGPASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ include "skilly.secretName" . }}
                  key: POSTGRES_PASSWORD
            - name: SKILLY_APP_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ include "skilly.secretName" . }}
                  key: APP_DB_PASSWORD
          command: ["/bin/sh", "-c"]
          args:
            - |
              set -eu
              echo "[migrate] waiting for postgres at $PGHOST:$PGPORT"
              until pg_isready -q; do sleep 2; done
              echo "[migrate] applying migrations"
              for f in $(ls /migrations/*.sql | sort); do
                echo "[migrate] -> $f"
                psql -v ON_ERROR_STOP=1 -f "$f"
              done
              echo "[migrate] setting skilly_app password"
              psql -v ON_ERROR_STOP=1 -c "ALTER ROLE skilly_app LOGIN PASSWORD '${SKILLY_APP_PASSWORD}';"
              echo "[migrate] done"
          volumeMounts:
            - name: migrations
              mountPath: /migrations
              readOnly: true
      volumes:
        - name: migrations
          configMap:
            name: {{ .Values.migrations.existingConfigMap | quote }}
