{{- if not .Values.secrets.existingSecret }}
{{- /* Audit M-8: fail closed rather than ship deployable placeholders. Provide real values
       (or set secrets.existingSecret) — a "change-me*" value aborts the render. */ -}}
{{- range $k, $v := dict "nextauthSecret" .Values.secrets.nextauthSecret "scimBearerToken" .Values.secrets.scimBearerToken "appDbPassword" .Values.secrets.appDbPassword "postgresPassword" .Values.secrets.postgresPassword "s3SecretKey" .Values.secrets.s3SecretKey }}
{{- if or (not $v) (hasPrefix "change-me" ($v | toString)) }}
{{- fail (printf "secrets.%s must be set to a real value (or use secrets.existingSecret); refusing to deploy a placeholder" $k) }}
{{- end }}
{{- end }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "skilly.fullname" . }}-secrets
  labels:
    {{- include "skilly.labels" . | nindent 4 }}
type: Opaque
stringData:
  NEXTAUTH_SECRET: {{ .Values.secrets.nextauthSecret | quote }}
  SCIM_BEARER_TOKEN: {{ .Values.secrets.scimBearerToken | quote }}
  ENTRA_CLIENT_SECRET: {{ .Values.secrets.entraClientSecret | quote }}
  APP_DB_PASSWORD: {{ .Values.secrets.appDbPassword | quote }}
  POSTGRES_PASSWORD: {{ .Values.secrets.postgresPassword | quote }}
  METRICS_TOKEN: {{ .Values.secrets.metricsToken | quote }}
  SMTP_PASSWORD: {{ .Values.secrets.smtpPassword | quote }}
  EMAIL_TOKEN_ENC_KEY: {{ .Values.secrets.emailTokenEncKey | quote }}
  S3_SECRET_KEY: {{ .Values.secrets.s3SecretKey | quote }}
{{- end }}
