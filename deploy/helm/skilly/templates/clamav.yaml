{{- if .Values.clamav.enabled }}
apiVersion: v1
kind: Service
metadata:
  name: {{ include "skilly.fullname" . }}-clamav
  labels:
    {{- include "skilly.labels" . | nindent 4 }}
    app.kubernetes.io/component: clamav
spec:
  ports:
    - port: 3310
      targetPort: 3310
  selector:
    app.kubernetes.io/instance: {{ .Release.Name }}
    app.kubernetes.io/component: clamav
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "skilly.fullname" . }}-clamav
  labels:
    {{- include "skilly.labels" . | nindent 4 }}
    app.kubernetes.io/component: clamav
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/instance: {{ .Release.Name }}
      app.kubernetes.io/component: clamav
  template:
    metadata:
      labels:
        {{- include "skilly.labels" . | nindent 8 }}
        app.kubernetes.io/component: clamav
    spec:
      containers:
        - name: clamav
          image: {{ .Values.clamav.image | quote }}
          ports:
            - containerPort: 3310
          readinessProbe:
            tcpSocket:
              port: 3310
            initialDelaySeconds: 30
            periodSeconds: 15
{{- end }}
