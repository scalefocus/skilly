# skilly — v1 deployment topology (SKILLY_SPEC.md §13).
# Six services: web, worker, postgres, minio, clamav, migrate.
# TLS terminates at your org reverse proxy in prod; a sample proxy is included for dev.
#
#   cp .env.example .env   # fill secrets
#   docker compose up --build
name: skilly

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-skilly}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?set in .env}
      POSTGRES_DB: ${POSTGRES_DB:-skilly}
    volumes:
      - ./data/postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-skilly}"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  migrate:
    image: postgres:16-alpine
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      PGHOST: postgres
      PGUSER: ${POSTGRES_USER:-skilly}
      PGPASSWORD: ${POSTGRES_PASSWORD:?set in .env}
      PGDATABASE: ${POSTGRES_DB:-skilly}
      SKILLY_APP_PASSWORD: ${SKILLY_APP_PASSWORD:?set in .env}
    volumes:
      - ../db/migrations:/migrations:ro
      - ./migrate.sh:/migrate.sh:ro
    entrypoint: ["/bin/sh", "/migrate.sh"]
    restart: "no"

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-skilly}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:?set in .env}
    volumes:
      - ./data/minio:/data
    ports:
      - "9001:9001" # console (dev only)
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  git-perms:
    # The git repo root is a bind mount, which Docker creates ROOT-owned on the host. The worker
    # runs unprivileged as uid 1000 (node) and must mkdir/write bare repos under it; a fresh,
    # root-owned ./data/git is therefore NOT writable by the worker — every publish/synth sweep
    # fails with "EACCES: permission denied, mkdir '/data/git/global'", leaving skills stuck at
    # "repository not provisioned". This one-shot init (runs as root) makes the volume
    # uid-1000-writable BEFORE the worker starts. Same depends_on-completed pattern as `migrate`.
    image: alpine:3
    command: ["sh", "-c", "mkdir -p /data/git && chown -R 1000:1000 /data/git"]
    volumes:
      - ./data/git:/data/git
    restart: "no"

  clamav:
    image: clamav/clamav:latest
    # Signature updates require outbound network (see air-gap assumption, §13/§17).
    volumes:
      - ./data/clamav:/var/lib/clamav
    healthcheck:
      test: ["CMD-SHELL", "clamdscan --version || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
    restart: unless-stopped

  web:
    build:
      context: ..
      dockerfile: packages/web/Dockerfile
    depends_on:
      postgres:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
      minio:
        condition: service_healthy
    environment:
      DATABASE_URL: postgres://skilly_app:${SKILLY_APP_PASSWORD}@postgres:5432/${POSTGRES_DB:-skilly}
      NEXTAUTH_URL: ${PUBLIC_BASE_URL}
      # Internal URL for server-to-server NextAuth calls — avoids routing back through
      # the org proxy for session/token operations that stay within the Docker network.
      NEXTAUTH_URL_INTERNAL: http://web:3000
      NEXTAUTH_SECRET: ${NEXTAUTH_SECRET:?set in .env}
      ENTRA_TENANT_ID: ${ENTRA_TENANT_ID}
      ENTRA_CLIENT_ID: ${ENTRA_CLIENT_ID}
      ENTRA_CLIENT_SECRET: ${ENTRA_CLIENT_SECRET}
      SKILLY_REGISTRY_URL: ${PUBLIC_BASE_URL}
      SKILLY_BOOTSTRAP_ADMIN_GROUP: ${SKILLY_BOOTSTRAP_ADMIN_GROUP}
      S3_ENDPOINT: http://minio:9000
      S3_ACCESS_KEY: ${MINIO_ROOT_USER:-skilly}
      S3_SECRET_KEY: ${MINIO_ROOT_PASSWORD}
      # MUST match the worker's S3_BUCKET (default skilly-artifacts) — web WRITES uploaded
      # artifacts here and the worker READS them to provision git repos; a mismatch makes the
      # publish sweep get NoSuchKey and the skill stays "repository not provisioned".
      S3_BUCKET: ${S3_BUCKET:-skilly-artifacts}
      ONE_TIME_TOKEN_TTL_SECONDS: ${ONE_TIME_TOKEN_TTL_SECONDS:-300}
      # Content-Security-Policy posture (§22): enforce (default) | report-only | off.
      CSP_MODE: ${CSP_MODE:-enforce}
      METRICS_TOKEN: ${METRICS_TOKEN:-}
      # §12 email channel: token encryption key (shared with the worker) + SMTP_HOST so the
      # admin card's status pill can tell "SMTP fallback" from "email down".
      EMAIL_TOKEN_ENC_KEY: ${EMAIL_TOKEN_ENC_KEY:-}
      ENTRA_EMAIL_CLIENT_ID: ${ENTRA_EMAIL_CLIENT_ID:-}
      ENTRA_EMAIL_CLIENT_SECRET: ${ENTRA_EMAIL_CLIENT_SECRET:-}
      SMTP_HOST: ${SMTP_HOST:-}
    restart: unless-stopped
    expose:
      - "3000"

  worker:
    build:
      context: ..
      dockerfile: packages/worker/Dockerfile
    depends_on:
      postgres:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
      minio:
        condition: service_healthy
      git-perms:
        condition: service_completed_successfully
      # ClamAV is advisory (the scan pipeline degrades gracefully to "engine unavailable"), so we
      # don't block worker startup on its healthcheck — a cold boot runs freshclam first, which can
      # take minutes. service_started lets the worker come up; early scans self-heal once clamd is up.
      clamav:
        condition: service_started
    environment:
      DATABASE_URL: postgres://skilly_app:${SKILLY_APP_PASSWORD}@postgres:5432/${POSTGRES_DB:-skilly}
      WORKER_PORT: "4000"
      SCIM_BEARER_TOKEN: ${SCIM_BEARER_TOKEN:?set in .env}
      # ClamAV daemon address. Host = the compose service name (resolved by Compose's internal DNS);
      # port 3310 is clamd's default and matches the worker's own default — set explicitly here.
      CLAMAV_HOST: clamav
      CLAMAV_PORT: "3310"
      GIT_REPO_ROOT: /data/git
      PUBLIC_BASE_URL: ${PUBLIC_BASE_URL}
      S3_ENDPOINT: http://minio:9000
      S3_ACCESS_KEY: ${MINIO_ROOT_USER:-skilly}
      S3_SECRET_KEY: ${MINIO_ROOT_PASSWORD}
      S3_BUCKET: ${S3_BUCKET:-skilly-artifacts}
      # Notification delivery (all optional; in-app inbox always works). §12
      SMTP_HOST: ${SMTP_HOST:-}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASSWORD: ${SMTP_PASSWORD:-}
      SMTP_FROM: ${SMTP_FROM:-skilly@example.com}
      NOTIFY_WEBHOOK_URL: ${NOTIFY_WEBHOOK_URL:-}
      # §12 Graph email service account: decrypts the stored tokens for the delivery sweep.
      EMAIL_TOKEN_ENC_KEY: ${EMAIL_TOKEN_ENC_KEY:-}
      ENTRA_EMAIL_CLIENT_ID: ${ENTRA_EMAIL_CLIENT_ID:-}
      ENTRA_EMAIL_CLIENT_SECRET: ${ENTRA_EMAIL_CLIENT_SECRET:-}
      METRICS_TOKEN: ${METRICS_TOKEN:-}
      POINTER_REFRESH_INTERVAL_MS: ${POINTER_REFRESH_INTERVAL_MS:-86400000}
      # Entra Graph credentials for group membership reconciliation (§4b).
      ENTRA_TENANT_ID: ${ENTRA_TENANT_ID}
      ENTRA_CLIENT_ID: ${ENTRA_CLIENT_ID}
      ENTRA_CLIENT_SECRET: ${ENTRA_CLIENT_SECRET}
      SKILLY_BOOTSTRAP_ADMIN_GROUP: ${SKILLY_BOOTSTRAP_ADMIN_GROUP}
    restart: unless-stopped
    volumes:
      - ./data/git:/data/git
    expose:
      - "4000"

  proxy:
    # Dev-only sample reverse proxy. In production, terminate TLS at your org proxy.
    image: caddy:2-alpine
    depends_on:
      - web
      - worker
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
    ports:
      - "8080:8080"
    restart: unless-stopped
